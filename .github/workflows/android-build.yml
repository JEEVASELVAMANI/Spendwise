name: Build Android APK
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: {}
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Install Gradle 8.4
        run: |
          GRADLE_VERSION=8.4
          GRADLE_DIST_URL="https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip"
          echo "Downloading $GRADLE_DIST_URL"
          curl -L "$GRADLE_DIST_URL" -o /tmp/gradle.zip
          sudo unzip -d /opt/gradle /tmp/gradle.zip
          echo "GRADLE_HOME=/opt/gradle/gradle-${GRADLE_VERSION}" >> $GITHUB_ENV
          echo "PATH=/opt/gradle/gradle-${GRADLE_VERSION}/bin:$PATH" >> $GITHUB_ENV

      - name: List Gradle tasks
        run: |
          gradle :app:tasks --all

      - name: Build debug APK
        run: |
          gradle :app:assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: spendwise-apk
          path: app/build/outputs/apk/debug/app-debug.apk
